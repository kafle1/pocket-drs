<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pocket DRS — Pitch 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #0a0a0b;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      color: #F4F4F0;
    }
    #container { width: 100vw; height: 100vh; position: relative; }
    #canvas { width: 100%; height: 100%; display: block; }

    /* Top HUD strip — eyebrow + live dot */
    #hud-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.6px;
      color: rgba(244,244,240,0.55);
      text-transform: uppercase;
      mix-blend-mode: normal;
    }
    #hud-top .left { display: flex; align-items: center; gap: 10px; }
    #hud-top .dot {
      width: 6px; height: 6px; background: #FF2D2D; border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,45,45,0.7);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* Decision broadcast pill */
    #decision {
      position: fixed;
      top: 50px;
      left: 50%;
      transform: translateX(-50%) translateY(-12px);
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 2.6px;
      text-transform: uppercase;
      display: none;
      opacity: 0;
      transition: opacity 220ms ease, transform 220ms ease;
      color: #0a0a0b;
      border-radius: 2px;
    }
    #decision.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    #decision.out { background: #FF2D2D; display: block; }
    #decision.not-out { background: #00D957; display: block; }
    #decision.umpires-call { background: #FFB400; display: block; }

    /* Bottom legend with hairline */
    #legend {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      gap: 18px;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: rgba(244,244,240,0.6);
      pointer-events: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(180deg, rgba(10,10,11,0) 0%, rgba(10,10,11,0.55) 100%);
      backdrop-filter: blur(2px);
    }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-bar { width: 14px; height: 2px; }
    .legend-bar.flight  { background: #FF2D2D; }
    .legend-bar.post    { background: #00D957; }
    .legend-bar.predict { background: #FFB400; }

    /* Compass / orientation marker */
    #compass {
      position: fixed;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: rgba(244,244,240,0.35);
      writing-mode: vertical-rl;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="canvas"></canvas>
  </div>
  <div id="hud-top">
    <div class="left">
      <span class="dot"></span>
      <span>PITCH 3D / HAWK-EYE</span>
    </div>
    <div>POCKET-DRS</div>
  </div>
  <div id="decision"></div>
  <div id="compass">BOWLER → STRIKER</div>
  <div id="legend">
    <div class="legend-item"><div class="legend-bar flight"></div>FLIGHT</div>
    <div class="legend-item"><div class="legend-bar post"></div>BOUNCE</div>
    <div class="legend-item"><div class="legend-bar predict"></div>PREDICTED</div>
  </div>
  <script>
    (function () {
      'use strict';

      function post(type, payload) {
        try {
          if (window.HawkEyeBridge && typeof window.HawkEyeBridge.postMessage === 'function') {
            var msg = Object.assign({ type: type }, payload || {});
            window.HawkEyeBridge.postMessage(JSON.stringify(msg));
          }
        } catch (_) {
          // no-op
        }
      }

      window.__hawkeyeBridgePost = post;

      window.addEventListener('error', function (e) {
        post('error', {
          message: String((e && e.message) || 'Unknown error'),
          source: String((e && e.filename) || ''),
          line: Number((e && e.lineno) || 0),
          col: Number((e && e.colno) || 0)
        });
      });

      window.addEventListener('unhandledrejection', function (e) {
        post('error', { message: String((e && e.reason) || 'Unhandled rejection') });
      });

      post('page_loaded');
    })();
  </script>
  <script src="three.min.js"></script>
  <script>
    // Minimal OrbitControls — touch/drag rotate.
    THREE.OrbitControls = function(camera, domElement) {
      this.camera = camera;
      this.domElement = domElement || document;
      this.target = new THREE.Vector3();
      this.minDistance = 0;
      this.maxDistance = Infinity;
      this.minPolarAngle = 0;
      this.maxPolarAngle = Math.PI;
      this.enableDamping = false;
      this.dampingFactor = 0.05;

      var scope = this;
      var spherical = new THREE.Spherical();
      var sphericalDelta = new THREE.Spherical();
      var scale = 1;
      var rotateStart = new THREE.Vector2();
      var rotateEnd = new THREE.Vector2();
      var rotateDelta = new THREE.Vector2();
      var STATE = { NONE: -1, ROTATE: 0, TOUCH_ROTATE: 1 };
      var state = STATE.NONE;

      function onPointerDown(event) {
        if (event.touches) {
          if (event.touches.length === 1) {
            state = STATE.TOUCH_ROTATE;
            rotateStart.set(event.touches[0].pageX, event.touches[0].pageY);
          }
        } else {
          state = STATE.ROTATE;
          rotateStart.set(event.clientX, event.clientY);
        }
      }

      function onPointerMove(event) {
        if (state === STATE.NONE) return;
        if (event.touches) {
          if (event.touches.length === 1) {
            rotateEnd.set(event.touches[0].pageX, event.touches[0].pageY);
          }
        } else {
          rotateEnd.set(event.clientX, event.clientY);
        }
        rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(0.003);
        sphericalDelta.theta -= rotateDelta.x;
        sphericalDelta.phi -= rotateDelta.y;
        rotateStart.copy(rotateEnd);
      }

      function onPointerUp() {
        state = STATE.NONE;
      }

      this.domElement.addEventListener('mousedown', onPointerDown, false);
      this.domElement.addEventListener('mousemove', onPointerMove, false);
      this.domElement.addEventListener('mouseup', onPointerUp, false);
      this.domElement.addEventListener('touchstart', onPointerDown, false);
      this.domElement.addEventListener('touchmove', onPointerMove, false);
      this.domElement.addEventListener('touchend', onPointerUp, false);

      this.update = function() {
        var offset = new THREE.Vector3();
        offset.copy(scope.camera.position).sub(scope.target);
        spherical.setFromVector3(offset);

        spherical.theta += sphericalDelta.theta;
        spherical.phi += sphericalDelta.phi;
        spherical.phi = Math.max(scope.minPolarAngle, Math.min(scope.maxPolarAngle, spherical.phi));
        spherical.makeSafe();
        spherical.radius *= scale;
        spherical.radius = Math.max(scope.minDistance, Math.min(scope.maxDistance, spherical.radius));

        offset.setFromSpherical(spherical);
        scope.camera.position.copy(scope.target).add(offset);
        scope.camera.lookAt(scope.target);

        if (scope.enableDamping) {
          sphericalDelta.theta *= (1 - scope.dampingFactor);
          sphericalDelta.phi *= (1 - scope.dampingFactor);
        } else {
          sphericalDelta.set(0, 0, 0);
        }
        scale = 1;
      };
    };
  </script>
  <script src="hawkeye.js"></script>
</body>
</html>
